name: Build VMPacker Windows
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build
        run: |
          go build -o VMPacker.exe ./cmd/vmpacker
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMPacker-Windows-EXE
          path: VMPacker.exe
